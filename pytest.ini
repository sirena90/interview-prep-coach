[pytest]
pythonpath = .
testpaths = tests
markers =
    llm: hits the real Anthropic API — costs money, deselected by default (run with: pytest -m llm)
    integration: builds the Chroma index — slower, deselected by default (run with: pytest -m integration)
addopts = -m "not llm and not integration"
filterwarnings =
    ignore:langsmith.wrappers._openai_agents is deprecated:DeprecationWarning
